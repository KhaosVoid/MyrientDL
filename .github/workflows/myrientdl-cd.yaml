name: MyrientDL CD

on:
  push:
    branches:
    - main
    paths-ignore:
    - '.github/**'
    - 'README.md'
    - '.gitignore'
  workflow_dispatch:

jobs:
  myrientdl-tag-commit:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.getversion.outputs.version }}
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: 'Install GitVersion'
      uses: gittools/actions/gitversion/setup@v4.3.3
      with:
        versionSpec: '6.x'

    - name: 'Determine Version'
      id: gitversion
      uses: gittools/actions/gitversion/execute@v4.3.3

    - name: 'Tag Commit'
      uses: mathieudutour/github-tag-action@v6.2
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        custom_tag: ${{ steps.gitversion.outputs.majorMinorPatch }}
        
    - id: getversion
      shell: bash
      run: |
        echo "version=${{ steps.gitversion.outputs.majorMinorPatch }}" >> "$GITHUB_OUTPUT"

  myrientdl-publish-linux-x64:
    runs-on: ubuntu-latest
    needs: myrientdl-tag-commit
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
        
    - shell: bash
      run: |
        echo "Version Output: ${{ needs.myrientdl-tag-commit.outputs.version }}"
        
    - name: 'Publish MyrientDL (linux-x64)'
      uses: KhaosVoid/KhaosVoid-GitHub-Shared/actions/publish-dotnet-application@main
      with:
        project-file: './src/MyrientDL'
        dotnet-runtime-id: linux-x64
        application-name: 'MyrientDL-linux-x64'
        version: ${{ needs.myrientdl-tag-commit.outputs.version }}
        
    - name: 'Upload Artifact'
      uses: actions/upload-artifact@v7
      with:
        path: './PublishOutput/MyrientDL-*'
        archive: false
        retention-days: 1
        
  myrientdl-publish-linux-arm64:
    runs-on: ubuntu-latest
    needs: myrientdl-tag-commit
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
        
    - name: 'Publish MyrientDL (linux-arm64)'
      uses: KhaosVoid/KhaosVoid-GitHub-Shared/actions/publish-dotnet-application@main
      with:
        project-file: './src/MyrientDL'
        dotnet-runtime-id: linux-arm64
        application-name: 'MyrientDL-linux-arm64'
        version: ${{ needs.myrientdl-tag-commit.outputs.version }}
        
    - name: 'Upload Artifact'
      uses: actions/upload-artifact@v7
      with:
        path: './PublishOutput/MyrientDL-*'
        archive: false
        retention-days: 1

  myrientdl-publish-win-x64:
    runs-on: ubuntu-latest
    needs: myrientdl-tag-commit
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: 'Publish MyrientDL (win-x64)'
      uses: KhaosVoid/KhaosVoid-GitHub-Shared/actions/publish-dotnet-application@main
      with:
        project-file: './src/MyrientDL'
        dotnet-runtime-id: win-x64
        application-name: 'MyrientDL-win-x64'
        version: ${{ needs.myrientdl-tag-commit.outputs.version }}
        
    - name: 'Upload Artifact'
      uses: actions/upload-artifact@v7
      with:
        path: './PublishOutput/MyrientDL-*'
        archive: false
        retention-days: 1

  myrientdl-publish-osx-x64:
    runs-on: ubuntu-latest
    needs: myrientdl-tag-commit
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
        
    - name: 'Publish MyrientDL (osx-x64)'
      uses: KhaosVoid/KhaosVoid-GitHub-Shared/actions/publish-dotnet-application@main
      with:
        project-file: './src/MyrientDL'
        dotnet-runtime-id: osx-x64
        application-name: 'MyrientDL-osx-x64'
        version: ${{ needs.myrientdl-tag-commit.outputs.version }}
        
    - name: 'Upload Artifact'
      uses: actions/upload-artifact@v7
      with:
        path: './PublishOutput/MyrientDL-*'
        archive: false
        retention-days: 1
        
  myrientdl-publish-osx-arm64:
    runs-on: ubuntu-latest
    needs: myrientdl-tag-commit
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
        
    - name: 'Publish MyrientDL (osx-arm64)'
      uses: KhaosVoid/KhaosVoid-GitHub-Shared/actions/publish-dotnet-application@main
      with:
        project-file: './src/MyrientDL'
        dotnet-runtime-id: osx-arm64
        application-name: 'MyrientDL-osx-arm64'
        version: ${{ needs.myrientdl-tag-commit.outputs.version }}
        
    - name: 'Upload Artifact'
      uses: actions/upload-artifact@v7
      with:
        path: './PublishOutput/MyrientDL-*'
        archive: false
        retention-days: 1
        
  myrientdl-create-release:
    runs-on: ubuntu-latest
    needs: [myrientdl-tag-commit, myrientdl-publish-linux-x64, myrientdl-publish-linux-arm64, myrientdl-publish-win-x64, myrientdl-publish-osx-x64, myrientdl-publish-osx-arm64]
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
          
    - name: 'Download Artifacts'
      uses: actions/download-artifact@v8
      with:
        path: './Release'
        merge-multiple: true
        
    - name: 'Create Release'
      shell: bash
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: gh release create v${{ needs.myrientdl-tag-commit.outputs.version }} ./Release/* --generate-notes --draft