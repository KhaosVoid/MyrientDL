name: MyrientDL CI

on:
  pull_request:
    branches:
    - main
    paths-ignore:
    - '.github/**'
    - 'README.md'
    - '.gitignore'
  workflow_dispatch:

jobs:
  myrientdl-ci:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: 'Install GitVersion'
      uses: gittools/actions/gitversion/setup@v4.3.3
      with:
        versionSpec: '6.x'

    - name: 'Determine Version'
      id: gitversion
      uses: gittools/actions/gitversion/execute@v4.3.3

    - name: 'Restore and Build Solution'
      uses: KhaosVoid/KhaosVoid-GitHub-Shared/actions/restore-build-solution@main
